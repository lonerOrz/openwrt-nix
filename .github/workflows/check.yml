name: Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: check-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix with flake support
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check formatting (treefmt)
        run: nix develop --command treefmt --ci
