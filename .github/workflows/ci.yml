name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        openwrt-version: ["latest", "23.05", "24.10"]
        include:
          - openwrt-version: "latest"
            test-label: "latest (apk)"
          - openwrt-version: "23.05"
            test-label: "23.05 (opkg)"
          - openwrt-version: "24.10"
            test-label: "24.10 (opkg)"
    name: Test (${{ matrix.test-label }})
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix with flake support
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Rust unit tests
        run: nix develop --command cargo test
      - name: Run container integration tests (OpenWrt ${{ matrix.openwrt-version }})
        env:
          CONTAINER_ENGINE: docker
          OPENWRT_VERSION: ${{ matrix.openwrt-version }}
        run: nix develop --command python3 -m pytest test/integration_test.py -v --tb=short
